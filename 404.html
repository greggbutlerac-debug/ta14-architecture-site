<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TA-14 Review Request Received</title>

  <style>
    body {
      margin: 0;
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      background: #ffffff;
      color: #0f172a;
      line-height: 1.55;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 96px 28px;
    }

    h1 {
      margin: 0 0 22px;
      font-size: clamp(3.2rem, 7vw, 5.8rem);
      line-height: 0.95;
      letter-spacing: -0.07em;
      font-weight: 950;
      color: #0f172a;
    }

    p {
      max-width: 850px;
      margin: 0 0 22px;
      color: #1e3a5f;
      font-size: 1.25rem;
      line-height: 1.7;
    }

    .chain {
      display: inline-block;
      margin: 18px 0 28px;
      padding: 18px 22px;
      border-radius: 18px;
      background: #020617;
      color: #ffffff;
      font-weight: 900;
      font-size: 1.05rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 30px;
    }

    a.button {
      display: inline-flex;
      min-height: 56px;
      align-items: center;
      justify-content: center;
      padding: 0 26px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 900;
      font-size: 1.05rem;
    }

    .primary {
      background: #0f172a;
      color: #ffffff;
    }

    .secondary {
      background: #ffffff;
      color: #0f172a;
      border: 1px solid #0f172a;
    }

    @media (max-width: 700px) {
      main {
        padding: 64px 20px;
      }

      .actions {
        flex-direction: column;
      }

      a.button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main id="page-content"></main>

  <script>
    const path = window.location.pathname.replace(/\/+$/, "");

    const thankYouContent = `
      <h1>TA-14 review request received.</h1>

      <p>
        Your TA-14 admissible-execution review request has been submitted.
        If follow-up is needed, TA-14 will respond using the contact information provided.
      </p>

      <div class="chain">
        Reality → Record → Continuity → Admissibility → Binding → Commit → Execution → Outcome
      </div>

      <p>
        This submission does not create a certification, endorsement, legal opinion,
        security audit, production validation, or guarantee. It begins a review intake process.
      </p>

      <p>
        If the form submission did not include all relevant materials, you may send supporting
        links or documents by email.
      </p>

      <div class="actions">
        <a class="button primary" href="/">Return Home</a>
        <a class="button secondary" href="/request-evaluation">Submit Another Review Request</a>
        <a
          class="button secondary"
          href="mailto:ta14admissibleexecution@gmail.com?subject=TA-14%20Review%20Request%20Follow-Up"
        >
          Email Follow-Up Materials
        </a>
      </div>
    `;

    const notFoundContent = `
      <h1>Page not found.</h1>

      <p>
        This TA-14 page route may have changed. Use the links below to return
        to the public site or request a review.
      </p>

      <div class="actions">
        <a class="button primary" href="/">Return Home</a>
        <a class="button secondary" href="/request-evaluation">Request Review</a>
      </div>
    `;

    document.getElementById("page-content").innerHTML =
      path === "/thank-you" ? thankYouContent : notFoundContent;
  </script>
</body>
</html>
